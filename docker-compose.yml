version: '3.8'

services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:v0.9.6
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "8087:8080"
    volumes:
      - ./scripts:/app/scripts:ro
      # Переписываем системный openssl.cnf — чтобы aiohttp/ssl использовал SECLEVEL=0
      # (OPENSSL_CONF игнорируется aiohttp, но /etc/ssl/openssl.cnf читается всегда)
      - ./openssl-legacy.cnf:/etc/ssl/openssl.cnf:ro
      # Нет персистентного волюма — база чистая при каждом деплое.
    environment:
      # ── LLM Provider (OpenAI-compatible API) ────────────────────────────────────
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_API_BASE_URL=${OPENAI_API_BASE_URL:-https://api.openai.com/v1}

      # ── Ollama (отключён, используем внешний LLM) ──────────────────────
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-}

      # ── Security ──────────────────────────────────────────────────────
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:-changeme-super-secret-key}
      - WEBUI_AUTH=${WEBUI_AUTH:-true}

      # ── Автосоздание администратора при первом запуске ─────────────────
      - WEBUI_ADMIN_EMAIL=${WEBUI_ADMIN_EMAIL:-}
      - WEBUI_ADMIN_PASSWORD=${WEBUI_ADMIN_PASSWORD:-}
      - WEBUI_ADMIN_NAME=${WEBUI_ADMIN_NAME:-Admin}

      # ── Общие настройки ──────────────────────────────────────────────
      - WEBUI_NAME=${WEBUI_NAME:-Open WebUI}
      - DEFAULT_MODELS=${DEFAULT_MODELS:-}
      - DEFAULT_USER_ROLE=${DEFAULT_USER_ROLE:-pending}
      - ENABLE_SIGNUP=${ENABLE_SIGNUP:-false}

      # ── RAG / Embeddings (отключаем загрузку с HuggingFace — сервер без интернета) ───
      - RAG_EMBEDDING_ENGINE=${RAG_EMBEDDING_ENGINE:-openai}
      - RAG_EMBEDDING_MODEL=${RAG_EMBEDDING_MODEL:-text-embedding-3-small}
      - ENABLE_RAG_WEB_SEARCH=${ENABLE_RAG_WEB_SEARCH:-false}

      # ── SSL ───────────────────────────────────────────────────────
      - OPENSSL_CONF=/etc/ssl/openssl.cnf
      - REQUESTS_CA_BUNDLE=
      - CURL_CA_BUNDLE=
      - PYTHONHTTPSVERIFY=0

      # ── Прокси: явно сбрасываем системный прокси ─────────────────────
      - HTTP_PROXY=
      - HTTPS_PROXY=
      - http_proxy=
      - https_proxy=
      - NO_PROXY=${NO_PROXY:-localhost,127.0.0.1,10.0.0.0/8}
      - no_proxy=${no_proxy:-localhost,127.0.0.1,10.0.0.0/8}

      # ── MCP ───────────────────────────────────────────────────────────
      - MCP_INITIALIZE_TIMEOUT=${MCP_INITIALIZE_TIMEOUT:-30}

      # ── Webhook ───────────────────────────────────────────────────────
      - WEBHOOK_GITLAB_SECRET_TOKEN=${WEBHOOK_GITLAB_SECRET_TOKEN:-}
      - WEBHOOK_GITHUB_SECRET_TOKEN=${WEBHOOK_GITHUB_SECRET_TOKEN:-}
    networks:
      - webui-net

  open-webui-init:
    image: open-webui-init:latest
    container_name: open-webui-init
    restart: "no"
    environment:
      - WEBUI_BASE_URL=${WEBUI_BASE_URL:-http://open-webui:8080}
      - WEBUI_ADMIN_EMAIL=${WEBUI_ADMIN_EMAIL:-}
      - WEBUI_ADMIN_PASSWORD=${WEBUI_ADMIN_PASSWORD:-}
      - MCP_SERVER_URLS=${MCP_SERVER_URLS:-}
      - NO_PROXY=localhost,127.0.0.1,10.0.0.0/8,open-webui
      - no_proxy=localhost,127.0.0.1,10.0.0.0/8,open-webui
    command: python /scripts/init-openwebui.py
    networks:
      - webui-net

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - webui-net
    profiles:
      - with-ollama

volumes:
  ollama-data:

networks:
  webui-net:
    driver: bridge
