version: '3.8'

services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:v0.8.10
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "8087:8080"
    volumes:
      - open-webui-data:/app/backend/data
      - ./scripts:/app/scripts:ro
    environment:
      # ── LLM Provider (OpenAI-compatible API) ──────────────────────────────
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_API_BASE_URL=${OPENAI_API_BASE_URL:-https://api.openai.com/v1}

      # ── Ollama (отключён, используем внешний LLM) ─────────────────────────
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-}

      # ── Security ──────────────────────────────────────────────────────────
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:-changeme-super-secret-key}
      - WEBUI_AUTH=${WEBUI_AUTH:-true}

      # ── Автосоздание администратора при первом запуске ────────────────────
      - WEBUI_ADMIN_EMAIL=${WEBUI_ADMIN_EMAIL:-}
      - WEBUI_ADMIN_PASSWORD=${WEBUI_ADMIN_PASSWORD:-}
      - WEBUI_ADMIN_NAME=${WEBUI_ADMIN_NAME:-Admin}

      # ── Общие настройки ───────────────────────────────────────────────────
      - WEBUI_NAME=${WEBUI_NAME:-Open WebUI}
      - DEFAULT_MODELS=${DEFAULT_MODELS:-}
      - DEFAULT_USER_ROLE=${DEFAULT_USER_ROLE:-pending}
      - ENABLE_SIGNUP=${ENABLE_SIGNUP:-false}

      # ── Прокси: явно сбрасываем системный прокси, чтобы локальные сервисы
      #    (MCP, Ollama) не шли через Squid. Внешние запросы (OpenAI API)
      #    будут ходить напрямую — убедитесь, что хост имеет прямой доступ.
      - HTTP_PROXY=
      - HTTPS_PROXY=
      - http_proxy=
      - https_proxy=
      - NO_PROXY=${NO_PROXY:-localhost,127.0.0.1,10.0.0.0/8}
      - no_proxy=${no_proxy:-localhost,127.0.0.1,10.0.0.0/8}

      # ── MCP Tool Server ───────────────────────────────────────────────────
      - MCP_SERVER_URL=${MCP_SERVER_URL:-}

      # ── Webhook integration ───────────────────────────────────────────────
      - WEBHOOK_GITLAB_SECRET_TOKEN=${WEBHOOK_GITLAB_SECRET_TOKEN:-}
      - WEBHOOK_GITHUB_SECRET_TOKEN=${WEBHOOK_GITHUB_SECRET_TOKEN:-}
    networks:
      - webui-net

  # ── Init-контейнер: создаёт admin + pipe function + MCP tool server ───────
  open-webui-init:
    image: python:3.11-slim
    container_name: open-webui-init
    restart: "no"
    volumes:
      - ./scripts:/scripts:ro
    environment:
      - WEBUI_BASE_URL=${WEBUI_BASE_URL:-http://open-webui:8080}
      - WEBUI_ADMIN_EMAIL=${WEBUI_ADMIN_EMAIL:-}
      - WEBUI_ADMIN_PASSWORD=${WEBUI_ADMIN_PASSWORD:-}
      - MCP_SERVER_URL=${MCP_SERVER_URL:-}
      # ── Прокси для pip install (доступ к pypi.org) ────────────────────────
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - NO_PROXY=${NO_PROXY:-localhost,127.0.0.1,10.0.0.0/8}
      - no_proxy=${no_proxy:-localhost,127.0.0.1,10.0.0.0/8}
    depends_on:
      - open-webui
    command: >
      bash -c "
        pip install requests --quiet &&
        echo 'Waiting for Open WebUI to start...' &&
        sleep 15 &&
        python /scripts/init-openwebui.py
      "
    networks:
      - webui-net

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - webui-net
    profiles:
      - with-ollama

  # ── Webhook Handler (MR_Checker) ──────────────────────────────────────────
  # webhook-handler:
  #   build:
  #     context: ./mr-checker
  #     dockerfile: Dockerfile
  #   container_name: webhook-handler
  #   restart: unless-stopped
  #   ports:
  #     - "8080:8080"
  #   environment:
  #     - WEBHOOK_GITLAB_SECRET_TOKEN=${WEBHOOK_GITLAB_SECRET_TOKEN:-}
  #     - WEBHOOK_GITHUB_SECRET_TOKEN=${WEBHOOK_GITHUB_SECRET_TOKEN:-}
  #   networks:
  #     - webui-net
  #   profiles:
  #     - with-webhook

volumes:
  open-webui-data:
  ollama-data:

networks:
  webui-net:
    driver: bridge
