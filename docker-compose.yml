version: '3.8'

services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:v0.8.10
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "8087:8080"
    volumes:
      - open-webui-data:/app/backend/data
      - ./scripts:/app/scripts:ro
    environment:
      # ── LLM Provider (OpenAI-compatible API) ──────────────────────────────
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_API_BASE_URL=${OPENAI_API_BASE_URL:-https://api.openai.com/v1}

      # ── Ollama (отключён, используем внешний LLM) ─────────────────────────
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-}

      # ── Security ──────────────────────────────────────────────────────────
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:-changeme-super-secret-key}
      - WEBUI_AUTH=${WEBUI_AUTH:-true}

      # ── Автосоздание администратора при первом запуске ────────────────────
      - WEBUI_ADMIN_EMAIL=${WEBUI_ADMIN_EMAIL:-}
      - WEBUI_ADMIN_PASSWORD=${WEBUI_ADMIN_PASSWORD:-}
      - WEBUI_ADMIN_NAME=${WEBUI_ADMIN_NAME:-Admin}

      # ── Общие настройки ───────────────────────────────────────────────────
      - WEBUI_NAME=${WEBUI_NAME:-Open WebUI}
      - DEFAULT_MODELS=${DEFAULT_MODELS:-}
      - DEFAULT_USER_ROLE=${DEFAULT_USER_ROLE:-pending}
      - ENABLE_SIGNUP=${ENABLE_SIGNUP:-false}

      # ── Прокси: явно сбрасываем системный прокси ─────────────────────────────
      - HTTP_PROXY=
      - HTTPS_PROXY=
      - http_proxy=
      - https_proxy=
      - NO_PROXY=${NO_PROXY:-localhost,127.0.0.1,10.0.0.0/8}
      - no_proxy=${no_proxy:-localhost,127.0.0.1,10.0.0.0/8}

      # ── Webhook integration ───────────────────────────────────────────────
      - WEBHOOK_GITLAB_SECRET_TOKEN=${WEBHOOK_GITLAB_SECRET_TOKEN:-}
      - WEBHOOK_GITHUB_SECRET_TOKEN=${WEBHOOK_GITHUB_SECRET_TOKEN:-}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - webui-net

  # ── Init-контейнер: запускается при каждом деплое ─────────────────────────
  open-webui-init:
    build:
      context: ./scripts
      dockerfile: Dockerfile
    image: open-webui-init:latest
    container_name: open-webui-init
    # restart: "no" убран — контейнер пересоздаётся при каждом `docker compose up`
    # Используйте `docker compose up --force-recreate open-webui-init` или
    # `docker compose run --rm open-webui-init` для ручного запуска
    restart: "no"
    environment:
      - WEBUI_BASE_URL=${WEBUI_BASE_URL:-http://open-webui:8080}
      - WEBUI_ADMIN_EMAIL=${WEBUI_ADMIN_EMAIL:-}
      - WEBUI_ADMIN_PASSWORD=${WEBUI_ADMIN_PASSWORD:-}
      - MCP_SERVER_URLS=${MCP_SERVER_URLS:-}
      - NO_PROXY=localhost,127.0.0.1,10.0.0.0/8,open-webui
      - no_proxy=localhost,127.0.0.1,10.0.0.0/8,open-webui
    depends_on:
      open-webui:
        condition: service_healthy
    # Убран sleep 15 — теперь ждём healthcheck open-webui
    command: python /scripts/init-openwebui.py
    networks:
      - webui-net

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - webui-net
    profiles:
      - with-ollama

volumes:
  open-webui-data:
  ollama-data:

networks:
  webui-net:
    driver: bridge
