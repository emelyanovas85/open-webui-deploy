version: '3.8'

services:
  open-webui:
    build:
      context: .
      dockerfile: Dockerfile
    image: open-webui-patched:v0.9.6
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "8087:8080"
    volumes:
      - ./scripts:/app/scripts:ro
      - ./openssl-legacy.cnf:/etc/ssl/openssl.cnf:ro
      - webui-data:/app/backend/data
    environment:
      # ── LLM Provider ─────────────────────────────────────────────────────
      - OPENAI_API_KEY=
      - OPENAI_API_BASE_URL=

      # ── Ollama (отключён) ────────────────────────────────────────────
      - OLLAMA_BASE_URL=
      - ENABLE_OLLAMA_API=false

      # ── Security ──────────────────────────────────────────────
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:-changeme-super-secret-key}
      - WEBUI_AUTH=${WEBUI_AUTH:-true}

      # ── Админ ──────────────────────────────────────────────
      - WEBUI_ADMIN_EMAIL=${WEBUI_ADMIN_EMAIL:-}
      - WEBUI_ADMIN_PASSWORD=${WEBUI_ADMIN_PASSWORD:-}
      - WEBUI_ADMIN_NAME=${WEBUI_ADMIN_NAME:-Admin}

      # ── Общие настройки ────────────────────────────────────────
      - WEBUI_NAME=${WEBUI_NAME:-Open WebUI}
      - DEFAULT_MODELS=${DEFAULT_MODELS:-}
      - DEFAULT_USER_ROLE=${DEFAULT_USER_ROLE:-pending}
      - ENABLE_SIGNUP=${ENABLE_SIGNUP:-false}

      # ── Task models ─────────────────────────────────────────
      - TASK_MODEL=${TASK_MODEL:-}
      - TASK_MODEL_EXTERNAL=${TASK_MODEL_EXTERNAL:-Qwen/Qwen3.5-397B-A17B-GPTQ-Int4}

      # ── RAG ───────────────────────────────────────────────
      - RAG_EMBEDDING_ENGINE=${RAG_EMBEDDING_ENGINE:-openai}
      - RAG_EMBEDDING_MODEL=${RAG_EMBEDDING_MODEL:-text-embedding-3-small}
      - ENABLE_RAG_WEB_SEARCH=${ENABLE_RAG_WEB_SEARCH:-false}

      # ── SSL ────────────────────────────────────────────────
      - PYTHONPATH=/app/scripts
      - OPENSSL_CONF=/etc/ssl/openssl.cnf
      - REQUESTS_CA_BUNDLE=
      - CURL_CA_BUNDLE=
      - PYTHONHTTPSVERIFY=0

      # ── Прокси ─────────────────────────────────────────────────
      # NO_PROXY прописан явно (не через ${VAR}) — обход бага docker-compose v1,
      # который обрезает значения переменных по первой запятой при подстановке из .env.
      - HTTP_PROXY=
      - HTTPS_PROXY=
      - http_proxy=
      - https_proxy=
      - NO_PROXY=localhost,127.0.0.1,10.1.5.97,10.1.5.6,10.1.26.2,chat.ehd-zr.cbr.ru
      - no_proxy=localhost,127.0.0.1,10.1.5.97,10.1.5.6,10.1.26.2,chat.ehd-zr.cbr.ru

      # ── MCP ───────────────────────────────────────────────────
      - MCP_INITIALIZE_TIMEOUT=${MCP_INITIALIZE_TIMEOUT:-30}

      # ── Webhook ──────────────────────────────────────────────
      - WEBHOOK_GITLAB_SECRET_TOKEN=${WEBHOOK_GITLAB_SECRET_TOKEN:-}
      - WEBHOOK_GITHUB_SECRET_TOKEN=${WEBHOOK_GITHUB_SECRET_TOKEN:-}
    networks:
      - webui-net

  open-webui-init:
    image: open-webui-init:latest
    container_name: open-webui-init
    restart: "no"
    depends_on:
      - open-webui
    volumes:
      - webui-data:/app/backend/data
    environment:
      - WEBUI_BASE_URL=${WEBUI_BASE_URL:-http://open-webui:8080}
      - WEBUI_ADMIN_EMAIL=${WEBUI_ADMIN_EMAIL:-}
      - WEBUI_ADMIN_PASSWORD=${WEBUI_ADMIN_PASSWORD:-}
      # MCP серверы и токены — оба нужны init-скрипту
      - MCP_SERVER_URLS=${MCP_SERVER_URLS:-}
      - MCP_BEARER_TOKENS=${MCP_BEARER_TOKENS:-}
      - NO_PROXY=localhost,127.0.0.1,10.1.5.97,10.1.5.6,open-webui
      - no_proxy=localhost,127.0.0.1,10.1.5.97,10.1.5.6,open-webui
    networks:
      - webui-net

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - webui-net
    profiles:
      - with-ollama

volumes:
  ollama-data:
  webui-data:

networks:
  webui-net:
    driver: bridge
