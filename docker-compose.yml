version: '3.8'

services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:v0.9.6
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "8087:8080"
    volumes:
      - ./scripts:/app/scripts:ro
      - ./openssl-legacy.cnf:/etc/ssl/openssl.cnf:ro
      - webui-data:/app/backend/data
    environment:
      # в”Ђв”Ђ LLM Provider в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_API_BASE_URL=${OPENAI_API_BASE_URL:-https://api.openai.com/v1}

      # в”Ђв”Ђ Ollama (РѕС‚РєР»СЋС‡С‘РЅ) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - OLLAMA_BASE_URL=
      - ENABLE_OLLAMA_API=false

      # в”Ђв”Ђ Security в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:-changeme-super-secret-key}
      - WEBUI_AUTH=${WEBUI_AUTH:-true}

      # в”Ђв”Ђ РђРґРјРёРЅ в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - WEBUI_ADMIN_EMAIL=${WEBUI_ADMIN_EMAIL:-}
      - WEBUI_ADMIN_PASSWORD=${WEBUI_ADMIN_PASSWORD:-}
      - WEBUI_ADMIN_NAME=${WEBUI_ADMIN_NAME:-Admin}

      # в”Ђв”Ђ РћР±С‰РёРµ РЅР°СЃС‚СЂРѕР№РєРё в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - WEBUI_NAME=${WEBUI_NAME:-Open WebUI}
      - DEFAULT_MODELS=${DEFAULT_MODELS:-}
      - DEFAULT_USER_ROLE=${DEFAULT_USER_ROLE:-pending}
      - ENABLE_SIGNUP=${ENABLE_SIGNUP:-false}

      # в”Ђв”Ђ Task models (Р·Р°РіРѕР»РѕРІРєРё, С‚РµРіРё) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - TASK_MODEL=${TASK_MODEL:-}
      - TASK_MODEL_EXTERNAL=${TASK_MODEL_EXTERNAL:-Qwen/Qwen3.5-397B-A17B-GPTQ-Int4}

      # в”Ђв”Ђ RAG в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - RAG_EMBEDDING_ENGINE=${RAG_EMBEDDING_ENGINE:-openai}
      - RAG_EMBEDDING_MODEL=${RAG_EMBEDDING_MODEL:-text-embedding-3-small}
      - ENABLE_RAG_WEB_SEARCH=${ENABLE_RAG_WEB_SEARCH:-false}

      # в”Ђв”Ђ SSL: sitecustomize.py РїР°С‚С‡РёС‚ ssl.create_default_context С‡РµСЂРµР· PYTHONPATH в”Ђв”Ђв”Ђв”Ђ
      # aiohttp РёРіРЅРѕСЂРёСЂСѓРµС‚ OPENSSL_CONF, РЅРѕ С‡РёС‚Р°РµС‚ sitecustomize.py РїСЂРё СЃС‚Р°СЂС‚Рµ
      - PYTHONPATH=/app/scripts
      - OPENSSL_CONF=/etc/ssl/openssl.cnf
      - REQUESTS_CA_BUNDLE=
      - CURL_CA_BUNDLE=
      - PYTHONHTTPSVERIFY=0

      # в”Ђв”Ђ РџСЂРѕРєСЃРё в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - HTTP_PROXY=
      - HTTPS_PROXY=
      - http_proxy=
      - https_proxy=
      - NO_PROXY=${NO_PROXY:-localhost,127.0.0.1,10.0.0.0/8}
      - no_proxy=${no_proxy:-localhost,127.0.0.1,10.0.0.0/8}

      # в”Ђв”Ђ MCP в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - MCP_INITIALIZE_TIMEOUT=${MCP_INITIALIZE_TIMEOUT:-30}

      # в”Ђв”Ђ Webhook в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - WEBHOOK_GITLAB_SECRET_TOKEN=${WEBHOOK_GITLAB_SECRET_TOKEN:-}
      - WEBHOOK_GITHUB_SECRET_TOKEN=${WEBHOOK_GITHUB_SECRET_TOKEN:-}
    networks:
      - webui-net

  open-webui-init:
    image: open-webui-init:latest
    container_name: open-webui-init
    restart: "no"
    volumes:
      - webui-data:/app/backend/data
    environment:
      - WEBUI_BASE_URL=${WEBUI_BASE_URL:-http://open-webui:8080}
      - WEBUI_ADMIN_EMAIL=${WEBUI_ADMIN_EMAIL:-}
      - WEBUI_ADMIN_PASSWORD=${WEBUI_ADMIN_PASSWORD:-}
      - MCP_SERVER_URLS=${MCP_SERVER_URLS:-}
      - NO_PROXY=localhost,127.0.0.1,10.0.0.0/8,open-webui
      - no_proxy=localhost,127.0.0.1,10.0.0.0/8,open-webui
    command: python /scripts/init-openwebui.py
    networks:
      - webui-net

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - webui-net
    profiles:
      - with-ollama

volumes:
  ollama-data:
  webui-data:

networks:
  webui-net:
    driver: bridge
