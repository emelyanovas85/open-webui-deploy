version: '3.8'

services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:v0.9.6
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "8087:8080"
    volumes:
      - ./scripts:/app/scripts:ro
      - ./openssl-legacy.cnf:/etc/ssl/openssl.cnf:ro
      - webui-data:/app/backend/data
    environment:
      # в”Җв”Җ LLM Provider в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      # РҹСҖСҸРјРҫР№ OpenAI endpoint РҫСӮРәР»СҺСҮС‘РҪ вҖ” РјРҫРҙРөР»Рё РҝРҫРҙРәР»СҺСҮРөРҪСӢ СҮРөСҖРөР· Pipe Function cbr_models.
      - OPENAI_API_KEY=
      - OPENAI_API_BASE_URL=

      # в”Җв”Җ Ollama (РҫСӮРәР»СҺСҮС‘РҪ) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      - OLLAMA_BASE_URL=
      - ENABLE_OLLAMA_API=false

      # в”Җв”Җ Security в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:-changeme-super-secret-key}
      - WEBUI_AUTH=${WEBUI_AUTH:-true}

      # в”Җв”Җ РҗРҙРјРёРҪ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      - WEBUI_ADMIN_EMAIL=${WEBUI_ADMIN_EMAIL:-}
      - WEBUI_ADMIN_PASSWORD=${WEBUI_ADMIN_PASSWORD:-}
      - WEBUI_ADMIN_NAME=${WEBUI_ADMIN_NAME:-Admin}

      # в”Җв”Җ РһРұСүРёРө РҪР°СҒСӮСҖРҫР№РәРё в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      - WEBUI_NAME=${WEBUI_NAME:-Open WebUI}
      - DEFAULT_MODELS=${DEFAULT_MODELS:-}
      - DEFAULT_USER_ROLE=${DEFAULT_USER_ROLE:-pending}
      - ENABLE_SIGNUP=${ENABLE_SIGNUP:-false}

      # в”Җв”Җ Task models (Р·Р°РіРҫР»РҫРІРәРё, СӮРөРіРё) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      - TASK_MODEL=${TASK_MODEL:-}
      - TASK_MODEL_EXTERNAL=${TASK_MODEL_EXTERNAL:-Qwen/Qwen3.5-397B-A17B-GPTQ-Int4}

      # в”Җв”Җ RAG в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      - RAG_EMBEDDING_ENGINE=${RAG_EMBEDDING_ENGINE:-openai}
      - RAG_EMBEDDING_MODEL=${RAG_EMBEDDING_MODEL:-text-embedding-3-small}
      - ENABLE_RAG_WEB_SEARCH=${ENABLE_RAG_WEB_SEARCH:-false}

      # в”Җв”Җ SSL: sitecustomize.py РҝР°СӮСҮРёСӮ ssl.create_default_context СҮРөСҖРөР· PYTHONPATH в”Җв”Җв”Җв”Җ
      - PYTHONPATH=/app/scripts
      - OPENSSL_CONF=/etc/ssl/openssl.cnf
      - REQUESTS_CA_BUNDLE=
      - CURL_CA_BUNDLE=
      - PYTHONHTTPSVERIFY=0

      # в”Җв”Җ РҹСҖРҫРәСҒРё в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      - HTTP_PROXY=
      - HTTPS_PROXY=
      - http_proxy=
      - https_proxy=
      - NO_PROXY=${NO_PROXY:-localhost,127.0.0.1,10.0.0.0/8}
      - no_proxy=${no_proxy:-localhost,127.0.0.1,10.0.0.0/8}

      # в”Җв”Җ MCP в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      - MCP_INITIALIZE_TIMEOUT=${MCP_INITIALIZE_TIMEOUT:-30}

      # в”Җв”Җ Webhook в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      - WEBHOOK_GITLAB_SECRET_TOKEN=${WEBHOOK_GITLAB_SECRET_TOKEN:-}
      - WEBHOOK_GITHUB_SECRET_TOKEN=${WEBHOOK_GITHUB_SECRET_TOKEN:-}
    networks:
      - webui-net

  open-webui-init:
    image: open-webui-init:latest
    container_name: open-webui-init
    restart: "no"
    depends_on:
      - open-webui
    volumes:
      - webui-data:/app/backend/data
    environment:
      - WEBUI_BASE_URL=${WEBUI_BASE_URL:-http://open-webui:8080}
      - WEBUI_ADMIN_EMAIL=${WEBUI_ADMIN_EMAIL:-}
      - WEBUI_ADMIN_PASSWORD=${WEBUI_ADMIN_PASSWORD:-}
      - MCP_SERVER_URLS=${MCP_SERVER_URLS:-}
      - NO_PROXY=localhost,127.0.0.1,10.0.0.0/8,open-webui
      - no_proxy=localhost,127.0.0.1,10.0.0.0/8,open-webui
    networks:
      - webui-net

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - webui-net
    profiles:
      - with-ollama

volumes:
  ollama-data:
  webui-data:

networks:
  webui-net:
    driver: bridge
