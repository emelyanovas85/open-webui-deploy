# =============================================================================
# docker-compose.base.yml — базовый стек: только open-webui
#
# Используется скриптом deploy.sh.
# Ollama не включён — в данном сценарии используется внешний
# OpenAI-совместимый API (настраивается через OPENAI_API_BASE_URL в .env).
# webhook-handler (профиль with-webhook) требует сборки из ./mr-checker
# и запускается отдельно:
#   docker-compose -f docker-compose.yml --profile with-webhook up -d
# =============================================================================
version: '3.8'

services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "8087:8080"
    volumes:
      - open-webui-data:/app/backend/data
    environment:
      # Внешний LLM Provider (OpenAI-совместимый API)
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_API_BASE_URL=${OPENAI_API_BASE_URL:-https://api.openai.com/v1}

      # Авторизация
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:-changeme-super-secret-key}
      - WEBUI_AUTH=${WEBUI_AUTH:-true}

      # Общие настройки
      - WEBUI_NAME=${WEBUI_NAME:-Open WebUI}
      - DEFAULT_MODELS=${DEFAULT_MODELS:-}
      - DEFAULT_USER_ROLE=${DEFAULT_USER_ROLE:-pending}
      - ENABLE_SIGNUP=${ENABLE_SIGNUP:-true}

      # Webhook интеграция
      - WEBHOOK_GITLAB_SECRET_TOKEN=${WEBHOOK_GITLAB_SECRET_TOKEN:-}
      - WEBHOOK_GITHUB_SECRET_TOKEN=${WEBHOOK_GITHUB_SECRET_TOKEN:-}
    networks:
      - webui-net

volumes:
  open-webui-data:

networks:
  webui-net:
    driver: bridge
